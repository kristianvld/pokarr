name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Install Playwright browser
        run: bunx playwright install chromium

      - name: Smoke built UI
        run: bun run smoke:built

      - name: Run React Doctor
        run: |
          set -euo pipefail

          score="$(bun run doctor:score | tail -n 1)"
          echo "react-doctor score: ${score}"
          test "${score}" -ge 75

      - name: Docker smoke test
        run: |
          set -euo pipefail

          docker build -t pokarr:ci .
          container_id="$(docker run -d -p 127.0.0.1:3001:3000 pokarr:ci)"
          trap 'docker rm -f "${container_id}" >/dev/null 2>&1 || true' EXIT
          bun run smoke:built -- --url http://127.0.0.1:3001
